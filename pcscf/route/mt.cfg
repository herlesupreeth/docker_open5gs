#!ifdef WITH_N5
route[MT_N5_CALL_PCF_POLICY_AUTH] {
	$var(contact_uri) = $(ct{nameaddr.uri});
	$var(ue_ip) = $(var(contact_uri){uri.host});
	$var(app_session) = $null;
	if ($sht(ue_ip_to_call_app_session_map=>$var(ue_ip)) != $null) {
		$var(app_session) = $sht(ue_ip_to_call_app_session_map=>$var(ue_ip));
		# Update again so that Hash table does not remove the entry upon session timer expiry.
		$sht(ue_ip_to_call_app_session_map=>$var(ue_ip)) = $var(app_session);
		$sht(mt_call_id_to_call_app_session_and_ue_ip_map=>$ci) = $var(app_session) + ";" + $var(ue_ip);
	}
	# Send N5 PCF policy authorization only on replies.
	if (!is_reply() || !has_body("application/sdp")) {
		return;
	}
	$var(req_sdp) = $T_req($sdp(body));
	$var(rep_sdp) = $sdp(body);
	xlog("L_INFO","Req SDP: $var(req_sdp)\n");
	xlog("L_INFO","Rep SDP: $var(rep_sdp)\n");

	$var(current_media) = "";
	$var(req_audio_rtp_port) = $null;
	$var(req_audio_rtcp_port) = $null;
	$var(req_video_rtp_port) = $null;
	$var(req_video_rtcp_port) = $null;
	$var(req_audio_rtcp_explicit) = 0;
	$var(req_video_rtcp_explicit) = 0;
	$var(audio_bw_as) = 0;
	$var(video_bw_as) = 0;

	# Split SDP into lines and iterate.
	$var(req_sdp_lines_count) = $(var(req_sdp){line.count});
	$var(req_sdp_line_num) = 0;
	while ($var(req_sdp_line_num) < $var(req_sdp_lines_count)) {
		$var(sdp_line) = $(var(req_sdp){line.at,$var(req_sdp_line_num)});
		# Check for audio media line: "m=audio <port>".
		if ($var(sdp_line) =~ "^m=audio") {
			$var(current_media) = "audio";
			$var(req_audio_rtp_port) = $(var(sdp_line){s.select,1, });
		}
		# Check for video media line: "m=video <port>".
		else if ($var(sdp_line) =~ "^m=video") {
			$var(current_media) = "video";
			$var(req_video_rtp_port) = $(var(sdp_line){s.select,1, });
		}
		# Check for explicit RTCP attribute: "a=rtcp:<port>".
		else if ($var(sdp_line) =~ "^a=rtcp:") {
			if ($var(current_media) == "audio") {
				$var(req_audio_rtcp_port) = $(var(sdp_line){s.substr,7,0});
				$var(req_audio_rtcp_explicit) = 1;
			} else if ($var(current_media) == "video") {
				$var(req_video_rtcp_port) = $(var(sdp_line){s.substr,7,0});
				$var(req_video_rtcp_explicit) = 1;
			}
		}
		# Check for bandwidth information.
		else if ($var(sdp_line) =~ "^b=AS:") {
			if ($var(current_media) == "audio") {
				$var(audio_bw_as) = $(var(sdp_line){s.substr,5,0});
			} else if ($var(current_media) == "video") {
				$var(video_bw_as) = $(var(sdp_line){s.substr,5,0});
			}
		}
		$var(req_sdp_line_num) = $var(req_sdp_line_num) + 1;
	}

	# Fallback: RTCP = RTP + 1 (RFC 3550 default) if no explicit a=rtcp.
	if ($var(req_audio_rtcp_explicit) != 1 && $var(req_audio_rtp_port) != $null) {
		$var(req_audio_rtcp_port) = $(var(req_audio_rtp_port){s.int}) + 1;
	}
	if ($var(req_video_rtcp_explicit) != 1 && $var(req_video_rtp_port) != $null) {
		$var(req_video_rtcp_port) = $(var(req_video_rtp_port){s.int}) + 1;
	}

	$var(current_media) = "";
	$var(rep_audio_rtp_port) = $null;
	$var(rep_audio_rtcp_port) = $null;
	$var(rep_video_rtp_port) = $null;
	$var(rep_video_rtcp_port) = $null;
	$var(rep_audio_rtcp_explicit) = 0;
	$var(rep_video_rtcp_explicit) = 0;
	# Split SDP into lines and iterate.
	$var(rep_sdp_lines_count) = $(var(rep_sdp){line.count});
	$var(rep_sdp_line_num) = 0;
	while ($var(rep_sdp_line_num) < $var(rep_sdp_lines_count)) {
		$var(sdp_line) = $(var(rep_sdp){line.at,$var(rep_sdp_line_num)});
		# Check for audio media line: "m=audio <port>".
		if ($var(sdp_line) =~ "^m=audio") {
			$var(current_media) = "audio";
			$var(rep_audio_rtp_port) = $(var(sdp_line){s.select,1, });
		}
		# Check for video media line: "m=video <port>".
		else if ($var(sdp_line) =~ "^m=video") {
			$var(current_media) = "video";
			$var(rep_video_rtp_port) = $(var(sdp_line){s.select,1, });
		}
		# Check for explicit RTCP attribute: "a=rtcp:<port>".
		else if ($var(sdp_line) =~ "^a=rtcp:") {
			if ($var(current_media) == "audio") {
				$var(rep_audio_rtcp_port) = $(var(sdp_line){s.substr,7,0});
				$var(rep_audio_rtcp_explicit) = 1;
			} else if ($var(current_media) == "video") {
				$var(rep_video_rtcp_port) = $(var(sdp_line){s.substr,7,0});
				$var(rep_video_rtcp_explicit) = 1;
			}
		}
		# Check for bandwidth information.
		else if ($var(sdp_line) =~ "^b=AS:") {
			if ($var(current_media) == "audio") {
				$var(audio_bw_as) = $(var(sdp_line){s.substr,5,0});
			} else if ($var(current_media) == "video") {
				$var(video_bw_as) = $(var(sdp_line){s.substr,5,0});
			}
		}
		$var(rep_sdp_line_num) = $var(rep_sdp_line_num) + 1;
	}

	# Fallback: RTCP = RTP + 1 (RFC 3550 default) if no explicit a=rtcp.
	if ($var(rep_audio_rtcp_explicit) != 1 && $var(rep_audio_rtp_port) != $null) {
		$var(rep_audio_rtcp_port) = $(var(rep_audio_rtp_port){s.int}) + 1;
	}
	if ($var(rep_video_rtcp_explicit) != 1 && $var(rep_video_rtp_port) != $null) {
		$var(rep_video_rtcp_port) = $(var(rep_video_rtp_port){s.int}) + 1;
	}

	$var(req_sdp_ip) = $(var(req_sdp){line.sw,c=IN}{s.select,2, });
	$var(rep_sdp_ip) = $sdp(c:ip);

	xlog("L_INFO", "Request SDP Parse Result from $var(req_sdp_ip) - Audio RTP: $var(req_audio_rtp_port), RTCP: $var(req_audio_rtcp_port)\n");
	xlog("L_INFO", "Reply SDP Parse Result from $var(rep_sdp_ip) - Audio RTP: $var(rep_audio_rtp_port), RTCP: $var(rep_audio_rtcp_port)\n");
	if ($var(req_video_rtp_port) != $null && $var(req_video_rtp_port) > 0) {
		xlog("L_INFO", "Request SDP Parse Result from $var(req_sdp_ip) - Video RTP: $var(req_video_rtp_port), RTCP: $var(req_video_rtcp_port)\n");
	} else {
		xlog("L_INFO", "Request SDP Parse Result from $var(req_sdp_ip) - Audio only (no video)\n");
	}
	if ($var(rep_video_rtp_port) != $null && $var(rep_video_rtp_port) > 0) {
		xlog("L_INFO", "Reply SDP Parse Result from $var(rep_sdp_ip) - Video RTP: $var(rep_video_rtp_port), RTCP: $var(rep_video_rtcp_port)\n");
	} else {
		xlog("L_INFO", "Reply SDP Parse Result from $var(rep_sdp_ip) - Audio only (no video)\n");
	}

	$var(audio_media_component_body) = '"0": {
		"medCompN": 1,
		"qosReference": "qosVoNR",
		"medType": "AUDIO",
		"codecs": [
			"downlink\n0\n",
			"uplink\n0\n"
		],
		"medSubComps": {
			"0": {
				"fNum": 1,
				"fDescs": [
					"permit out 17 from ' + $var(req_sdp_ip) + ' ' + $var(req_audio_rtp_port) + ' to ' + $var(rep_sdp_ip) + ' ' + $var(rep_audio_rtp_port) + '",
					"permit in 17 from ' + $var(rep_sdp_ip) + ' ' + $var(rep_audio_rtp_port) + ' to ' + $var(req_sdp_ip) + ' ' + $var(req_audio_rtp_port) + '",
					"permit out 17 from ' + $var(req_sdp_ip) + ' ' + $var(req_audio_rtcp_port) + ' to ' + $var(rep_sdp_ip) + ' ' + $var(rep_audio_rtcp_port) + '",
					"permit in 17 from ' + $var(rep_sdp_ip) + ' ' + $var(rep_audio_rtcp_port) + ' to ' + $var(req_sdp_ip) + ' ' + $var(req_audio_rtcp_port) + '"
				],
				"fStatus": "ENABLED",
				"marBwDl": "' + $var(audio_bw_as) + ' Kbps",
				"marBwUl": "' + $var(audio_bw_as) + ' Kbps",
				"flowUsage": "NO_INFO"
			}
		}
	}';
	# Callee → Caller.
	if (($fU != $null && is_in_profile("callee", "$fU")) || ($tU != $null && is_in_profile("caller", "$tU"))) {
		$var(audio_media_component_body) = '"0": {
			"medCompN": 1,
			"qosReference": "qosVoNR",
			"medType": "AUDIO",
			"codecs": [
				"downlink\n0\n",
				"uplink\n0\n"
			],
			"medSubComps": {
				"0": {
					"fNum": 1,
					"fDescs": [
						"permit out 17 from ' + $var(rep_sdp_ip) + ' ' + $var(rep_audio_rtp_port) + ' to ' + $var(req_sdp_ip) + ' ' + $var(req_audio_rtp_port) + '",
						"permit in 17 from ' + $var(req_sdp_ip) + ' ' + $var(req_audio_rtp_port) + ' to ' + $var(rep_sdp_ip) + ' ' + $var(rep_audio_rtp_port) + '",
						"permit out 17 from ' + $var(rep_sdp_ip) + ' ' + $var(rep_audio_rtcp_port) + ' to ' + $var(req_sdp_ip) + ' ' + $var(req_audio_rtcp_port) + '",
						"permit in 17 from ' + $var(req_sdp_ip) + ' ' + $var(req_audio_rtcp_port) + ' to ' + $var(rep_sdp_ip) + ' ' + $var(rep_audio_rtcp_port) + '"
					],
					"fStatus": "ENABLED",
					"marBwDl": "' + $var(audio_bw_as) + ' Kbps",
					"marBwUl": "' + $var(audio_bw_as) + ' Kbps",
					"flowUsage": "NO_INFO"
				}
			}
		}';
	}

	$var(video_media_component_body) = "";
	# NOTE: Only if both request and reply SDPs have video media, we consider video for policy authorization and include it in the media components. This is to handle the case where one side doesn't support video and hence doesn't include it in the SDP at all.
	if ($var(req_video_rtp_port) != $null && $var(req_video_rtp_port) > 0 && $var(rep_video_rtp_port) != $null && $var(rep_video_rtp_port) > 0) {
		$var(video_media_component_body) = '"1": {
			"medCompN": 2,
			"qosReference": "qosVoNR",
			"medType": "VIDEO",
			"codecs": [
				"downlink\n0\n",
				"uplink\n0\n"
			],
			"medSubComps": {
				"0": {
					"fNum": 2,
					"fDescs": [
						"permit out 17 from ' + $var(req_sdp_ip) + ' ' + $var(req_video_rtp_port) + ' to ' + $var(rep_sdp_ip) + ' ' + $var(rep_video_rtp_port) + '",
						"permit in 17 from ' + $var(rep_sdp_ip) + ' ' + $var(rep_video_rtp_port) + ' to ' + $var(req_sdp_ip) + ' ' + $var(req_video_rtp_port) + '",
						"permit out 17 from ' + $var(req_sdp_ip) + ' ' + $var(req_video_rtcp_port) + ' to ' + $var(rep_sdp_ip) + ' ' + $var(rep_video_rtcp_port) + '",
						"permit in 17 from ' + $var(rep_sdp_ip) + ' ' + $var(rep_video_rtcp_port) + ' to ' + $var(req_sdp_ip) + ' ' + $var(req_video_rtcp_port) + '"
					],
					"fStatus": "ENABLED",
					"marBwDl": "' + $var(video_bw_as) + ' Kbps",
					"marBwUl": "' + $var(video_bw_as) + ' Kbps",
					"flowUsage": "NO_INFO"
				}
			}
		}';
		# Callee → Caller.
		if (($fU != $null && is_in_profile("callee", "$fU")) || ($tU != $null && is_in_profile("caller", "$tU"))) {
			$var(video_media_component_body) = '"1": {
				"medCompN": 2,
				"qosReference": "qosVoNR",
				"medType": "VIDEO",
				"codecs": [
					"downlink\n0\n",
					"uplink\n0\n"
				],
				"medSubComps": {
					"0": {
						"fNum": 2,
						"fDescs": [
							"permit out 17 from ' + $var(rep_sdp_ip) + ' ' + $var(rep_video_rtp_port) + ' to ' + $var(req_sdp_ip) + ' ' + $var(req_video_rtp_port) + '",
							"permit in 17 from ' + $var(req_sdp_ip) + ' ' + $var(req_video_rtp_port) + ' to ' + $var(rep_sdp_ip) + ' ' + $var(rep_video_rtp_port) + '",
							"permit out 17 from ' + $var(rep_sdp_ip) + ' ' + $var(rep_video_rtcp_port) + ' to ' + $var(req_sdp_ip) + ' ' + $var(req_video_rtcp_port) + '",
							"permit in 17 from ' + $var(req_sdp_ip) + ' ' + $var(req_video_rtcp_port) + ' to ' + $var(rep_sdp_ip) + ' ' + $var(rep_video_rtcp_port) + '"
						],
						"fStatus": "ENABLED",
						"marBwDl": "' + $var(video_bw_as) + ' Kbps",
						"marBwUl": "' + $var(video_bw_as) + ' Kbps",
						"flowUsage": "NO_INFO"
					}
				}
			}';
		}
	}

	$var(media_components_body) = "";
	if ($var(video_media_component_body) != "") {
		$var(media_components_body) = $var(audio_media_component_body) + "," + $var(video_media_component_body);
	} else {
		$var(media_components_body) = $var(audio_media_component_body);
	}

	$var(ue_policy_authorization_body) = '{
		"ascReqData": {
			"afAppId": "+g.3gpp.icsi-ref=\"urn%3Aurn-7%3A3gpp-service.ims.icsi.mmtel\"",
			"dnn": "ims",
			"medComponents": { ' + $var(media_components_body) + ' },
			"evSubsc": {
				"events": [
					{
						"event": "QOS_NOTIF",
						"notifMethod": "PERIODIC"
					},
					{
						"event": "ANI_REPORT",
						"notifMethod": "ONE_TIME"
					}
				]
			},
			"notifUri": "http://N5_BIND_IP:N5_BIND_PORT",
			"sponStatus": "SPONSOR_DISABLED",
			"gpsi": "msisdn-' + $fU + '",
			"suppFeat": "2",
			"ueIpv4": "' + $var(ue_ip) + '"
		}
	}';
	jansson_append("obj", "", "$var(ue_policy_authorization_body)", "$var(ue_policy_authorization_json_body)");

	xlog("L_DBG", "Constructed UE policy authorization body: $var(ue_policy_authorization_json_body)\n");

	$var(time_now)=$_s($timef(%a, %d %b %Y %H:%M:%S %Z));
	if ($var(app_session) != $null) {
		xnotice("MT - N5 QoS Auth session already exists for UE with IP $var(ue_ip) so sending a patch request\n");

		# Set HTTP2 request headers.
		$var(headers) = "Content-Type: application/merge-patch+json\r\n";
		$var(headers) = $var(headers) + "3gpp-sbi-discovery-target-nf-type: PCF\r\n";
		$var(headers) = $var(headers) + "accept: application/json\r\n";
		$var(headers) = $var(headers) + "accept: application/problem+json\r\n";
		$var(headers) = $var(headers) + "3gpp-sbi-max-rsp-time: 10000\r\n";
		$var(headers) = $var(headers) + "3gpp-sbi-discovery-service-names: npcf-policyauthorization\r\n";
		$var(headers) = $var(headers) + "3gpp-sbi-sender-timestamp: " + $var(time_now);

		http_client_request_v2pk("PATCH", "http://SCP_BIND_IP:SCP_BIND_PORT/npcf-policyauthorization/v1/app-sessions/$var(app_session)", "$var(ue_policy_authorization_json_body)", "$var(headers)", "$var(result)");
		switch ($rc) {
			# Success case.
			case 200:
				xlog("L_INFO", "N5 QoS Session modification successfully updated. Reason code: $rc\n");
				xlog("L_INFO", "HTTP results: $var(result)\n");
				xlog("L_INFO", "HTTP response: $rc\n");
				xlog("L_INFO", "cURL Response: $curlerror(error)\n");
				xlog("L_INFO", "Location Header header: $httprhdr(location)\n");
				break;
			# Failure case.
			default:
				xlog("L_ERR", "N5 QoS Session modification failed for UE with IP $var(ue_ip). Reason code: $rc\n");
				xlog("L_ERR", "IMS: ttag: "+ "$avp(TTAG_CUSTOM_AVP)");
				xlog("L_ERR", "IMS: ftag: "+ "$avp(FTAG_CUSTOM_AVP)");
				xlog("L_ERR", "IMS: callid: "+ "$avp(CALLID_CUSTOM_AVP)");
				# Comment this if you want to allow even if authorization fails.
				if(dlg_get("$avp(CALLID_CUSTOM_AVP)","$avp(FTAG_CUSTOM_AVP)","$avp(TTAG_CUSTOM_AVP)")){
					dlg_terminate("all", "N5 QoS authorization (modification) failed for call");
				} else {
					send_reply("412", "N5 QoS authorization (modification) failed for call");
				}
				exit;
		}
	} else {
		xlog("L_INFO","MT - Creating N5 QoS Auth session for UE with IP $var(ue_ip)\n");

		$var(headers) = "Content-Type: application/json\r\n";
		$var(headers) = $var(headers) + "3gpp-sbi-discovery-target-nf-type: PCF\r\n";
		$var(headers) = $var(headers) + "accept: application/json\r\n";
		$var(headers) = $var(headers) + "accept: application/problem+json\r\n";
		$var(headers) = $var(headers) + "3gpp-sbi-max-rsp-time: 10000\r\n";
		$var(headers) = $var(headers) + "3gpp-sbi-discovery-service-names: npcf-policyauthorization\r\n";
		$var(headers) = $var(headers) + "3gpp-sbi-sender-timestamp: " + $var(time_now);

		xlog("L_INFO","SIP Call. Sending N5 QoS Auth for $fu to PCF\n");
		# Send the request to PCF.
		http_client_request_v2pk("POST", "http://SCP_BIND_IP:SCP_BIND_PORT/npcf-policyauthorization/v1/app-sessions", "$var(ue_policy_authorization_json_body)", "$var(headers)", "$var(result)" );

		switch ($rc) {
			# Success case.
			case 201:
				xlog("L_INFO", "N5 QoS Session successfully created $rc\n");
				xlog("L_INFO", "HTTP results: [$var(result)]\n");
				xlog("L_INFO", "HTTP response/ Return code: [$rc]\n");
				xlog("L_INFO", "Location Header: [$httprhdr(location)]\n");

				# Retrieve the AppSession Id out of the location Header if the resopnse is 201.
				# Example URL: "http://SCP_BIND_IP:SCP_BIND_PORT/npcf-policyauthorization/v1/app-sessions/(someSessionID)"

				# Extract the AppSession Id.
				$var(response_url) = $httprhdr(location);
				$var(response_url) = $(var(response_url){s.trim});
				$var(app_session) = $(var(response_url){s.select,-1,/});

				# Store the AppSession Id in the hash table associated with the IP address in the last Via SIP header.
				$sht(ue_ip_to_call_app_session_map=>$var(ue_ip)) = $var(app_session);
				# Store the AppSession Id in the hash table associated with the dialog Call-Id.
				$sht(mt_call_id_to_call_app_session_and_ue_ip_map=>$ci) = $var(app_session) + ";" + $var(ue_ip);
				xlog("L_INFO", "Stored call AppSession Id for IP $var(ue_ip) is $var(app_session)\n");
				break;
			# Failure case.
			default:
				xlog("L_ERR", "N5 QoS Session authorization failed for UE with IP $var(ue_ip). Reason code: $rc\n");
				xlog("L_ERR", "IMS: ttag: "+ "$avp(TTAG_CUSTOM_AVP)");
				xlog("L_ERR", "IMS: ftag: "+ "$avp(FTAG_CUSTOM_AVP)");
				xlog("L_ERR", "IMS: callid: "+ "$avp(CALLID_CUSTOM_AVP)");
				# Comment this if you want to allow even if authorization fails.
				if(dlg_get("$avp(CALLID_CUSTOM_AVP)","$avp(FTAG_CUSTOM_AVP)","$avp(TTAG_CUSTOM_AVP)")){
					dlg_terminate("all", "N5 QoS authorization failed for call");
				} else {
					send_reply("412", "N5 QoS authorization failed for call");
				}
				exit;
		}
	}
}

route[MT_N5_CALL_PCF_POLICY_AUTH_DELETE] {
	# Retrieve the AppSession Id from the hash table.
	if ($sht(mt_call_id_to_call_app_session_and_ue_ip_map=>$ci) == $null) {
		xlog("L_WARN", "No call AppSession found for Call-Id $ci\n");
		return;
	}
	$var(app_session_and_ue_ip) = $sht(mt_call_id_to_call_app_session_and_ue_ip_map=>$ci);
	$var(app_session) = $(var(app_session_and_ue_ip){s.select,0,;});
	$var(ue_ip) = $(var(app_session_and_ue_ip){s.select,1,;});

	xlog("L_INFO", "Terminating AppSession with Id $var(app_session) for UE with IP $var(ue_ip) due to call end\n");

	$var(time_now)=$_s($timef(%a, %d %b %Y %H:%M:%S %Z));
	$var(headers) = "X-SIP-Status: Call-End-MT\r\n";
	$var(headers) = $var(headers) + "3gpp-sbi-discovery-target-nf-type: PCF\r\n";
	$var(headers) = $var(headers) + "accept: application/json\r\n";
	$var(headers) = $var(headers) + "accept: application/problem+json\r\n";
	$var(headers) = $var(headers) + "3gpp-sbi-max-rsp-time: 10000\r\n";
	$var(headers) = $var(headers) + "3gpp-sbi-discovery-service-names: npcf-policyauthorization\r\n";
	$var(headers) = $var(headers) + "3gpp-sbi-sender-timestamp: " + $var(time_now);

	$var(json_request) = "";

	http_client_request_v2pk("POST", "http://SCP_BIND_IP:SCP_BIND_PORT/npcf-policyauthorization/v1/app-sessions/$var(app_session)/delete", "$var(json_request)", "$var(headers)", "$var(result)");
	xlog("L_INFO", "CURL error: [$curlerror(error)]\n");
	xlog("L_INFO", "HTTP results: [$var(result)]\n");
	xlog("L_INFO", "HTTP response/ Return code: [$rc]\n");
	xlog("L_INFO", "Location Header: [$httprhdr(location)]\n");

	# Clear hashtable content irrespective of the response from PCF/IMS as the call has ended.
	$sht(ue_ip_to_call_app_session_map=>$var(ue_ip)) = $null;
	$sht(mt_call_id_to_call_app_session_and_ue_ip_map=>$ci) = $null;
}
